<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playwrite+AU+VIC+Guides&family=Roboto:ital,wght@0,100..900;1,100..900&family=Sigmar&family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>js-biglietto-treno-form</title>
</head>

<body>
    <img src="scatto-verticale-di-una-stazione-ferroviaria-con-il-treno-durante-l-alba_181624-13413.avif" alt="">
    <header>
        <h1>Viaggio in treno</h1>
    </header>
    <div class="container">
        <main>
            <form id="formBiglietto">
                <label for="chilometri">Chilometri da percorrere:</label>
                <input type="number" id="chilometri" required placeholder="Esempio 100">
                <label for="anni">Età del passeggero:</label>
                <input type="number" id="anni" required placeholder="Esempio 30">
                <button type="submit" id="btnInvia">Invia</button>
            </form>

            <div id="areaBiglietto">
                <h2>Il tuo Biglietto del Treno</h2>
                <p>Distanza: <span id="recapChilometri">---</span> km</p>
                <p>Prezzo Finale: <span id="prezzoEsposto">0.00</span> €</p>
            </div>

        </main>
    </div>
</body>

</html>
