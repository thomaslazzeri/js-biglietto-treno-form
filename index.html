<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>js-biglietto-treno-form</title>
</head>

<body>
    <header>
        <h1>Viaggio in treno</h1>
    </header>
    <div class="container">
        <main>
            <form id="formBiglietto">
                <label for="chilometri">Chilometri da percorrere:</label>
                <input type="number" id="chilometri" required placeholder="Esempio 100">
                <label for="anni">Età del passeggero:</label>
                <input type="number" id="anni" required placeholder="Esempio 30">
                <button type="submit" id="btnInvia">Invia</button>
            </form>

            <div id="areaBiglietto">
                <h2>Il tuo Biglietto del Treno</h2>
                <p>Distanza: <span id="recapChilometri">---</span> km</p>
                <p>Prezzo Finale: <span id="prezzoEsposto">0.00</span> €</p>
            </div>

        </main>
    </div>
</body>

</html>
